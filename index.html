<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可信安全平台</title>
  <style>
    :root {
      --bg-page: #020617;
      --bg-panel: rgba(2, 8, 23, 0.9);
      --border: rgba(34, 211, 238, 0.36);
      --text-main: #dbeafe;
      --text-sub: #93c5fd;
      --accent-soft: rgba(20, 184, 166, 0.22);
      --shadow: 0 0 32px rgba(34, 211, 238, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.18) 0%, transparent 36%),
        radial-gradient(circle at 90% 90%, rgba(59, 130, 246, 0.18) 0%, transparent 38%),
        linear-gradient(rgba(34, 211, 238, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.055) 1px, transparent 1px),
        var(--bg-page);
      background-size: auto, auto, 34px 34px, 34px 34px, auto;
      color: var(--text-main);
    }

    .app {
      width: min(1800px, 96vw);
      margin: 28px auto;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 1fr 8fr;
      height: calc(95vh - 53.2px);
      overflow: hidden;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      background: rgba(2, 8, 23, 0.82);
    }

    .brand {
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      margin: 0 0 14px;
      text-transform: uppercase;
    }

    .nav,
    .subnav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .subnav {
      margin-top: 6px;
      padding-left: 10px;
      border-left: 1px dashed rgba(125, 211, 252, 0.32);
      display: none;
    }

    .subnav.is-open {
      display: block;
    }

    .nav-button,
    .subnav-button {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-main);
      text-align: left;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .nav-button {
      font-size: 15px;
      font-weight: 600;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .subnav-button {
      font-size: 14px;
      padding: 8px 10px;
      margin-top: 6px;
      color: #bfdbfe;
    }

    .nav-button:hover,
    .subnav-button:hover {
      background: rgba(14, 165, 233, 0.16);
      border-color: rgba(34, 211, 238, 0.38);
    }

    .nav-button.is-active,
    .subnav-button.is-active {
      background: var(--accent-soft);
      border-color: #2dd4bf;
      color: #ecfeff;
      box-shadow: 0 0 14px rgba(45, 212, 191, 0.26);
    }

    .content {
      padding: 18px;
      min-height: 0;
      display: flex;
    }

    .content-stack {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(2, 8, 23, 0.88);
      overflow: hidden;
      box-shadow: inset 0 0 28px rgba(34, 211, 238, 0.08);
    }

    .content-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #020617;
      display: none;
    }

    .content-frame.is-active {
      display: block;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .content-stack {
        min-height: 494px;
        height: 494px;
      }
    }

    @media (max-width: 520px) {
      .app {
        width: 96vw;
        margin: 14px auto;
      }

      .content {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <p class="brand">Trusted Security</p>
      <ul class="nav">
        <li>
          <button class="nav-button is-active" data-role="main-tab" data-tab="certification" type="button">
            可信安全认证
          </button>
        </li>
        <li>
          <button class="nav-button" data-role="main-tab" data-tab="access" type="button">
            可信安全接入
          </button>
          <ul class="subnav" id="access-subnav">
            <li>
              <button class="subnav-button" data-role="sub-tab" data-tab="physical" type="button">物理层方案</button>
            </li>
            <li>
              <button class="subnav-button" data-role="sub-tab" data-tab="network" type="button">网络层方案</button>
            </li>
            <li>
              <button class="subnav-button" data-role="sub-tab" data-tab="defense" type="button">抗攻击能力</button>
            </li>
          </ul>
        </li>
      </ul>
    </aside>

    <section class="content" aria-live="polite">
      <div class="content-stack">
        <iframe
          class="content-frame"
          data-page="certification"
          title="可信安全认证页面"
          src="pages/certification.html?v=20260511-tech-theme-readable"
        ></iframe>
        <iframe
          class="content-frame"
          data-page="physical"
          title="物理层方案"
          src="pages/physical.html?v=20260511-tech-theme-readable"
        ></iframe>
        <iframe
          class="content-frame"
          data-page="network"
          title="网络层方案"
          src="pages/network.html?v=20260511-tech-theme-readable"
        ></iframe>
        <iframe
          class="content-frame"
          data-page="defense"
          title="抗攻击能力"
          src="pages/defense.html?v=20260512-defense-top-title-bold"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const mainTabs = document.querySelectorAll('[data-role="main-tab"]');
      const subTabs = document.querySelectorAll('[data-role="sub-tab"]');
      const accessSubnav = document.getElementById('access-subnav');
      const contentFrames = document.querySelectorAll('.content-frame');

      let activePage = 'certification';
      let lastAccessSubTab = 'physical';

      function setActivePage(pageKey) {
        activePage = pageKey;
        contentFrames.forEach((frame) => {
          frame.classList.toggle('is-active', frame.dataset.page === pageKey);
        });

        mainTabs.forEach((tab) => tab.classList.remove('is-active'));
        subTabs.forEach((tab) => tab.classList.remove('is-active'));

        if (pageKey === 'certification') {
          document.querySelector('[data-role="main-tab"][data-tab="certification"]').classList.add('is-active');
          accessSubnav.classList.remove('is-open');
          return;
        }

        document.querySelector('[data-role="main-tab"][data-tab="access"]').classList.add('is-active');
        accessSubnav.classList.add('is-open');
        const activeSubTab = document.querySelector('[data-role="sub-tab"][data-tab="' + pageKey + '"]');
        if (activeSubTab) {
          activeSubTab.classList.add('is-active');
        }
      }

      mainTabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          const tabKey = tab.dataset.tab;
          if (tabKey === 'certification') {
            setActivePage('certification');
            return;
          }
          setActivePage(lastAccessSubTab || 'physical');
        });
      });

      subTabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          const tabKey = tab.dataset.tab;
          lastAccessSubTab = tabKey;
          setActivePage(tabKey);
        });
      });

      setActivePage(activePage);
    })();
  </script>
</body>
</html>
