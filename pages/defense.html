<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全防御</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(34, 211, 238, 0.18), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(59, 130, 246, 0.18), transparent 30%),
        linear-gradient(135deg, #020617 0%, #08111f 48%, #020617 100%);
      color: #dbeafe;
      overflow: auto;
    }

    /* 页面整体四宫格：左上流程图、右上攻击示意图、左下测试控制、右下日志终端 */
    .page {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 0.48fr) minmax(0, 0.52fr);
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-areas:
        "flow image"
        "controls logs";
      gap: 14px;
      padding: 6px 16px;
      background:
        linear-gradient(rgba(34, 211, 238, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.055) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.12), transparent 38%),
        #020617;
      background-size: 34px 34px, 34px 34px, auto, auto;
      overflow: hidden;
    }

    /* 右上角攻击示意图所在网格 */
    .image-wrap {
      grid-area: image;
      position: relative;
      z-index: 2;
      display: grid;
      align-items: start;
      justify-items: end;
      height: 100%;
      min-height: 0;
      overflow: visible;
      background: transparent;
      padding: 0;
    }

    /* 右上角攻击示意图外层定位容器 */
    .canvas {
      position: relative;
      overflow: visible;
      display: grid;
      align-items: start;
      justify-items: end;
      width: 100%;
      height: 100%;
      background: transparent;
      /* padding: 0 20px; */
    }

    /* 右上角攻击示意图缩放画布：内部所有元素跟随该画布整体缩放 */
    .canvas-scale {
      --defense-image-scale: 0.6;
      --defense-image-width: 1600px;
      --defense-image-height: 720px;
      background:
        linear-gradient(rgba(14, 165, 233, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.16), transparent 46%),
        #07111f;
      background-size: 32px 32px, 32px 32px, auto, auto;
      position: absolute;
      top: 0;
      right: 0;
      overflow: hidden;
      display: flex;
      gap: 80px;
      width: var(--defense-image-width);
      height: var(--defense-image-height);
      flex: none;
      transform: scale(var(--defense-image-scale));
      transform-origin: top right;
    }

    /* 右上攻击示意图左侧：自私接入攻击流程示意 */
    .left-area {
      flex: 1;
      height: 100%;
      background:
        radial-gradient(circle at 30% 20%, rgba(34, 211, 238, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(2, 6, 23, 0.96));
      position: relative;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.46);
      box-shadow: inset 0 0 24px rgba(56, 189, 248, 0.12), 0 0 18px rgba(14, 165, 233, 0.18);
    }

    /* 右上攻击示意图右侧：高频重接入攻击流程示意 */
    .right-area {
      flex: 1;
      height: 100%;
      background:
        radial-gradient(circle at 70% 18%, rgba(34, 211, 238, 0.18), transparent 34%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(2, 6, 23, 0.96));
      position: relative;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.46);
      box-shadow: inset 0 0 24px rgba(56, 189, 248, 0.12), 0 0 18px rgba(14, 165, 233, 0.18);
    }

    .left-area div[style],
    .right-area div[style] {
      color: #e0f2fe !important;
      font-size: 19px !important;
      text-shadow:
        0 1px 2px rgba(2, 6, 23, 0.95),
        0 0 10px rgba(34, 211, 238, 0.72);
    }


    /* 自私接入攻击示意图标题条 */
    .area-title1 {
      background: linear-gradient(90deg, #0f766e, #0ea5e9);
      color: #ecfeff;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 22px;
      border-radius: 10px 10px 0 0;
      margin: 4px;
    }

    /* 高频重接入攻击示意图标题条 */
    .area-title2 {
      background: linear-gradient(90deg, #0f766e, #0ea5e9);
      color: #ecfeff;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 22px;
      border-radius: 10px 10px 0 0;
      margin: 4px;
    }

    .m-line-fail {
      stroke: #f97316;
      stroke-width: 1;
      filter: drop-shadow(0 0 4px rgba(249, 115, 22, 0.58));
    }

    /* 成功连线样式*/
    .m-line-success {
      stroke: #38bdf8;
      stroke-width: 1;
      filter: drop-shadow(0 0 4px rgba(56, 189, 248, 0.58));
    }

    .m-line-connect {
      stroke: #dbeafe;
      stroke-width: 1;
      filter: drop-shadow(0 0 4px rgba(219, 234, 254, 0.5));
    }

    .m-line-attack {
      stroke: #ef4444;
      stroke-width: 1;
      filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.62));
    }

    .element {
      position: absolute;
      pointer-events: none;
    }
    .connection-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .uav-label {
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      margin-top: 4px;
    }
    .status-text {
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }
    .status-text.fail {
      color: #f97316;
    }
    .status-text.success {
      color: #16a34a;
    }



    .top-panel {
      overflow: hidden;
    }

    .top-panel img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #ffffff;
    }

    /* 下方结构容器：使用 display: contents 让子模块直接进入四宫格 */
    .bottom-layout {
      min-height: 0;
      display: contents;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* 左侧逻辑容器：不显示自身外框，只承载控制框和流程框 */
    .left-panel {
      display: contents;
    }

    /* 左下测试控制框：按钮、测试次数、重接入间隔、黑名单 */
    .controls {
      grid-area: controls;
      width: 92%;
      justify-self: start;
      border: 1px solid rgba(34, 211, 238, 0.36);
      border-radius: 10px;
      /* border: 1px solid #d1d5db; */
      background: rgba(3, 12, 28, 0.86);
      padding: 6px 14px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 7px;
      min-height: 0;
      overflow: visible;
      box-shadow: inset 0 0 24px rgba(34, 211, 238, 0.08), 0 0 20px rgba(14, 165, 233, 0.14);
    }

    /* 两个攻击测试开始按钮所在行 */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 6px 0;
    }

    .action-btn {
      border: 1px solid rgba(45, 212, 191, 0.85);
      border-radius: 10px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.96), rgba(14, 165, 233, 0.94)),
        radial-gradient(circle at 20% 0%, rgba(236, 254, 255, 0.32), transparent 42%);
      color: #ecfeff;
      font-size: 17px;
      font-weight: 800;
      min-height: 52px;
      padding: 10px 10px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 2px rgba(2, 6, 23, 0.72), 0 0 10px rgba(224, 242, 254, 0.3);
      box-shadow: inset 0 0 18px rgba(224, 242, 254, 0.12), 0 0 12px rgba(14, 165, 233, 0.2);
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.42);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* 测试参数输入行和黑名单状态区 */
    .input-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      padding: 0 6px;
    }

    .parameter-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 70%;
    }

    .input-row label {
      font-size: 15px;
      font-weight: 800;
      color: #dff7ff;
      letter-spacing: 0.03em;
      text-shadow: 0 0 8px rgba(34, 211, 238, 0.28);
    }

    /* 无人机设备 ID 黑名单显示区 */
    .blacklist-area {
        margin: 8px 0 0;
        width: 148%;
        max-width: 148%;
        min-height: 124px;
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        grid-template-rows: 42px minmax(62px, 1fr);
        align-items: center;
        gap: 8px 10px;
        padding: 9px 13px;
        background:
          linear-gradient(135deg, rgba(127, 29, 29, 0.32), rgba(15, 23, 42, 0.9)),
          radial-gradient(circle at 0% 0%, rgba(248, 113, 113, 0.2), transparent 46%);
        border-radius: 18px;
        border: 1px solid rgba(248, 113, 113, 0.58);
        box-shadow:
          inset 0 0 26px rgba(248, 113, 113, 0.08),
          0 0 18px rgba(239, 68, 68, 0.2);

        overflow: visible;
        contain: layout paint;
        z-index: 3;
    }

    .blacklist-summary {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "icon title"
        "count title";
      align-items: center;
      column-gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid rgba(248, 113, 113, 0.28);
    }

    .blacklist-icon {
      grid-area: icon;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(220, 38, 38, 0.22);
      box-shadow: inset 0 0 12px rgba(248, 113, 113, 0.2);
    }

    .blacklist-label {
        font-weight: 900;
        color: #fecaca;
        font-size: 21px;
        line-height: 1.25;
        text-align: left;
        letter-spacing: 0.04em;
        white-space: nowrap;
        text-shadow: 0 1px 2px rgba(15, 23, 42, 0.72), 0 0 10px rgba(248, 113, 113, 0.24);
        padding: 0;
        background: transparent;
        border: 0;
    }

    .blacklist-area > .blacklist-label:first-child {
        grid-column: 1;
        grid-row: 1;
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        font-size: 22px;
        padding: 0;
        background: rgba(220, 38, 38, 0.22);
        box-shadow: inset 0 0 12px rgba(248, 113, 113, 0.2);
    }

    .blacklist-area > .blacklist-label:nth-child(2) {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        align-items: center;
        white-space: nowrap;
        min-height: 42px;
        padding: 0;
        border-radius: 0;
        background: transparent;
        border: 0;
    }

    .blacklist-count {
      grid-column: 3;
      grid-row: 1;
      align-self: center;
      justify-self: end;
      margin: 0;
      background: #dc2626;
      color: white;
      border-radius: 14px;
      min-width: 48px;
      height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 20px;
        padding: 0 8px;
        text-shadow: 0 1px 2px rgba(127, 29, 29, 0.72);
        box-shadow: 0 0 14px rgba(220, 38, 38, 0.42);
    }

    .blacklist-select {
      grid-column: 1 / 4;
      grid-row: 2;
      margin-left: 0;
      font-size: 17px;
      color: #fecaca;
      width: 100%;
      min-width: 0;
      height: 100%;
      min-height: 62px;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid rgba(248, 113, 113, 0.42);
      border-radius: 14px;
      padding: 8px;
      background: rgba(2, 6, 23, 0.56);
      outline: none;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
    }

    .blacklist-id-chip,
    .blacklist-empty {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .blacklist-id-chip {
      color: #fee2e2;
      background:
        linear-gradient(135deg, rgba(127, 29, 29, 0.95), rgba(220, 38, 38, 0.34)),
        radial-gradient(circle at 15% 0%, rgba(254, 202, 202, 0.24), transparent 46%);
      border: 1px solid rgba(248, 113, 113, 0.72);
      box-shadow: inset 0 0 10px rgba(254, 202, 202, 0.08), 0 0 10px rgba(220, 38, 38, 0.28);
    }

    .blacklist-empty {
      color: rgba(254, 202, 202, 0.58);
      border: 1px dashed rgba(248, 113, 113, 0.34);
      background: rgba(15, 23, 42, 0.42);
    }

    /* 数字输入框：测试次数和重接入间隔共用 */
    .count-input {
      width: 100%;
      max-width: 100%;
      height: 32px;
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.86);
      color: #e0f2fe;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 0 34px 0 10px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .count-input::-webkit-outer-spin-button,
    .count-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .count-input-wrap {
      position: relative;
      width: 205px;
      max-width: 100%;
      height: 32px;
    }

    .time-input-wrap {
      width: 86px;
      max-width: 100%;
    }

    .time-input {
      height : 24px;
      padding-right: 10px;
    }

    /* 测试次数输入框右侧上下箭头容器 */
    .count-stepper {
      position: absolute;
      right: 4px;
      top: 0px;
      bottom: 0px;
      width: 24px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
    }

    .count-step-btn {
      border: 1px solid rgba(125, 211, 252, 0.45);
      border-radius: 4px;
      background: rgba(15, 23, 42, 0.95);
      color: #bae6fd;
      font-size: 10px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .count-step-btn:hover:not(:disabled) {
      background: rgba(14, 165, 233, 0.2);
      border-color: #22d3ee;
      color: #67e8f9;
    }

    .count-step-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .count-input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.18);
    }

    /* 当前测试状态提示文本 */
    .status {
      margin: 0;
      font-size: 19px;
      color: #cffafe;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-shadow: 0 0 10px rgba(34, 211, 238, 0.42);
      background: rgba(8, 47, 73, 0.28);
      border: 1px solid rgba(56, 189, 248, 0.22);
      border-radius: 999px;
      min-height: 34px;
      padding: 11px 16px;
      min-height: 0;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 左上流程图外部框 */
    .flow-area {
      grid-area: flow;
      position: relative;
      z-index: 1;
      border: 1px solid #e5e7eb;
      /* border: 1px solid #d1d5db; */
      border-radius: 10px;
      background: rgba(2, 8, 23, 0.92);
      border: 1px solid rgba(34, 211, 238, 0.4);
      box-shadow: 0 0 28px rgba(34, 211, 238, 0.22);
      padding: 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      align-content: stretch;
      overflow: hidden;
      min-height: 0;
      width: min(100%, 530px);
      height: 100%;
      align-self: center;
      justify-self: start;
    }

    /* 流程 SVG 的自适应包裹容器 */
    .flow-wrap {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flow-demo-title {
      margin: 0 0 8px;
      min-height: 36px;
      padding: 8px 16px;
      border: 1px solid rgba(45, 212, 191, 0.72);
      border-radius: 10px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.9), rgba(14, 165, 233, 0.82)),
        radial-gradient(circle at 100% 0%, rgba(251, 191, 36, 0.14), transparent 34%);
      color: #ecfeff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.15;
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.24);
    }

    /* 左上流程 SVG：随外部框大小自适应 */
    .flow-svg {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      min-height: 0;
      object-fit: fill;
      display: block;
    }

    .flow-wrap .flow-svg + .flow-svg {
      display: none;
    }

    .flow-card-bg {
      fill: rgba(15, 23, 42, 0.62);
      stroke: rgba(56, 189, 248, 0.24);
      stroke-width: 1.5;
      filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.16));
    }

    .flow-card-accent {
      fill: rgba(34, 211, 238, 0.12);
    }

    .flow-base {
      fill: none;
      stroke: rgba(125, 211, 252, 0.58);
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #22d3ee;
      stroke-width: 15;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(34, 211, 238, 0.72));
    }

    .flow-node {
      fill: #020617;
      stroke: #7dd3fc;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #082f49;
      stroke: #22d3ee;
    }

    .flow-node.is-active {
      fill: #083344;
      stroke: #67e8f9;
      stroke-width: 4;
    }

    .flow-label {
      fill: #e0f2fe;
      font-size: 21px;
      font-weight: 800;
      user-select: none;
    }

    .flow-label-small {
      fill: #e0f2fe;
      font-size: 18px;
      font-weight: 800;
      user-select: none;
    }

    .flow-label-long {
      fill: #e0f2fe;
      font-size: 15px;
      font-weight: 700;
      user-select: none;
    }

    .flow-heading {
      fill: #22d3ee;
      filter: drop-shadow(0 0 5px rgba(34, 211, 238, 0.52));
    }

    /* 右下日志区域：攻击分析日志和处置记录日志 */
    .right-panel {
      grid-area: logs;
      width: calc(100% + 8%);
      margin-left: -8%;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* 单个命令行日志卡片 */
    .log-box {
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.94), rgba(2, 6, 23, 0.96)),
        radial-gradient(circle at 0% 0%, rgba(251, 191, 36, 0.08), transparent 36%);
      color: #dbeafe;
      padding: 10px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      box-shadow:
        inset 0 0 22px rgba(15, 23, 42, 0.88),
        0 0 18px rgba(15, 23, 42, 0.36);
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .log-title {
      margin: 0;
      font-size: 15px;
      color: #fde68a;
      border-bottom: 1px solid rgba(251, 191, 36, 0.24);
      padding-bottom: 8px;
      letter-spacing: 0.04em;
      text-shadow: 0 0 8px rgba(251, 191, 36, 0.24);
    }

    .log-content {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      color: #cbd5e1;
      line-height: 1.6;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap;
    }

    .log-content li {
      margin: 0 0 8px;
      word-break: break-word;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    .log-line {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
    }

    .log-time {

              <circle id="highfreq-node-1" class="flow-node" cx="414" cy="296" r="10" />
              <circle id="highfreq-node-2" class="flow-node" cx="552" cy="296" r="10" />
              <text class="flow-label-small" x="246" y="326" text-anchor="middle">高频重接入</text>
              <text class="flow-label-small" x="414" y="326" text-anchor="middle">记录违规</text>
              <text class="flow-label-small" x="552" y="326" text-anchor="middle">加入黑名单</text>
            </svg>
            <svg class="flow-svg" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" aria-label="攻击处置流程图">
              <text class="flow-label-small flow-heading" x="70" y="28">自私接入攻击流程</text>
              <!-- 自私接入攻击流程底色线 -->
              <path class="flow-base" d="M60 62 L760 62" />

              <!-- 自私接入攻击流程动画段 1-4 -->
              <path id="selfish-seg-0" class="flow-active" d="M60 62 L150 62" />
              <path id="selfish-seg-1" class="flow-active" d="M150 62 L350 62" />
              <path id="selfish-seg-2" class="flow-active" d="M350 62 L550 62" />
              <path id="selfish-seg-3" class="flow-active" d="M550 62 L760 62" />

              <!-- 自私接入攻击流程节点 1-4 -->
              <circle id="selfish-node-0" class="flow-node" cx="150" cy="62" r="10" />
              <circle id="selfish-node-1" class="flow-node" cx="350" cy="62" r="10" />
              <circle id="selfish-node-2" class="flow-node" cx="550" cy="62" r="10" />
              <circle id="selfish-node-3" class="flow-node" cx="760" cy="62" r="10" />

              <text class="flow-label-long" x="150" y="104" text-anchor="middle">
                <tspan x="150" dy="0">无人机发送</tspan>
                <tspan x="150" dy="16">ID和公钥</tspan>
              </text>
              <text class="flow-label-small" x="350" y="116" text-anchor="middle">查询区块链</text>
              <text class="flow-label-small" x="550" y="116" text-anchor="middle">匹配信息</text>
              <text class="flow-label-small" x="760" y="116" text-anchor="middle">加入黑名单</text>

              <text class="flow-label-small flow-heading" x="70" y="218">高频重接入攻击流程</text>
              <!-- 高频重接入攻击流程底色线 -->
              <path class="flow-base" d="M80 248 L680 248" />

              <!-- 高频重接入攻击流程动画段 1-3 -->
              <path id="highfreq-seg-0" class="flow-active" d="M80 248 L180 248" />
              <path id="highfreq-seg-1" class="flow-active" d="M180 248 L430 248" />
              <path id="highfreq-seg-2" class="flow-active" d="M430 248 L680 248" />

              <!-- 高频重接入攻击流程节点 1-3 -->
              <circle id="highfreq-node-0" class="flow-node" cx="180" cy="248" r="10" />
              <circle id="highfreq-node-1" class="flow-node" cx="430" cy="248" r="10" />
              <circle id="highfreq-node-2" class="flow-node" cx="680" cy="248" r="10" />

              <text class="flow-label-small" x="180" y="300" text-anchor="middle">高频重接入</text>
              <text class="flow-label-small" x="430" y="300" text-anchor="middle">记录违规行为</text>
              <text class="flow-label-small" x="680" y="300" text-anchor="middle">加入黑名单</text>
            </svg>
          </div>
        </div>
      </article>

      <!-- 右下命令行日志区域 -->
      <article class="right-panel">
        <!-- 攻击分析终端日志 -->
        <section class="log-box">
          <h3 class="log-title">攻击分析终端日志</h3>
          <ul class="log-content" id="analysis-log"></ul>
          <p class="log-metric" id="analysis-metric">攻击分析测试识别率：--</p>
        </section>

        <!-- 处置记录终端日志 -->
        <section class="log-box">
          <h3 class="log-title">处置记录终端日志</h3>
          <ul class="log-content" id="dispose-log"></ul>
          <p class="log-metric" id="dispose-metric">处置记录已处置ID：--</p>
        </section>
      </article>
    </section>
  </main>

  <script>
    (function () {
      const DEFAULT_TEST_COUNT = 5;
      const DEFAULT_HIGHFREQ_TEST_COUNT = 1;
      const MIN_TEST_COUNT = 5;
      const MAX_TEST_COUNT = 10;
      const DEFAULT_HIGHFREQ_INTERVAL_MS = 800;
      const MIN_HIGHFREQ_INTERVAL_MS = 1;
      const MAX_HIGHFREQ_INTERVAL_MS = 60000;
      const HIGHFREQ_INTERVAL_THRESHOLD_MS = 1000;

      const selfishBtn = document.getElementById('selfish-btn');
      const highfreqBtn = document.getElementById('highfreq-btn');
      const testCountInput = document.getElementById('test-count');
      const highfreqIntervalInput = document.getElementById('highfreq-interval');
      const testCountUpBtn = document.getElementById('test-count-up');
      const testCountDownBtn = document.getElementById('test-count-down');
      const statusText = document.getElementById('status-text');
      const analysisLog = document.getElementById('analysis-log');
      const disposeLog = document.getElementById('dispose-log');
      const analysisMetric = document.getElementById('analysis-metric');
      const disposeMetric = document.getElementById('dispose-metric');

      let running = false;
      let selfishBlacklist = new Set();  // 自私接入攻击黑名单
      let highfreqBlacklist = new Set(); // 高频重接入攻击黑名单

      const flows = {
        selfish: {
          segments: [
            document.getElementById('selfish-seg-0'),
            document.getElementById('selfish-seg-1'),
            document.getElementById('selfish-seg-2'),
            document.getElementById('selfish-seg-3')
          ],
          nodes: [
            document.getElementById('selfish-node-0'),
            document.getElementById('selfish-node-1'),
            document.getElementById('selfish-node-2'),
            document.getElementById('selfish-node-3')
          ]
        },
        highfreq: {
          segments: [
            document.getElementById('highfreq-seg-0'),
            document.getElementById('highfreq-seg-1'),
            document.getElementById('highfreq-seg-2')
          ],
          nodes: [
            document.getElementById('highfreq-node-0'),
            document.getElementById('highfreq-node-1'),
            document.getElementById('highfreq-node-2')
          ]
        }
      };

      function nowTime() {
        return new Date().toLocaleTimeString('zh-CN', { hour12: false });
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function parseCount() {
        const raw = testCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_TEST_COUNT;
        }
        if (!/^\d+$/.test(raw)) {
          return null;
        }
        const value = Number(raw);
        if (value < MIN_TEST_COUNT || value > MAX_TEST_COUNT) {
          return null;
        }
        return value;
      }

      function clampCount(value) {
        return Math.min(MAX_TEST_COUNT, Math.max(MIN_TEST_COUNT, value));
      }

      function parseHighfreqInterval() {
        if (!highfreqIntervalInput) {
          return DEFAULT_HIGHFREQ_INTERVAL_MS;
        }
        const raw = highfreqIntervalInput.value.trim();
        if (raw === '') {
          return DEFAULT_HIGHFREQ_INTERVAL_MS;
        }
        if (!/^\d+$/.test(raw)) {
          return null;
        }
        const value = Number(raw);
        if (value < MIN_HIGHFREQ_INTERVAL_MS || value > MAX_HIGHFREQ_INTERVAL_MS) {
          return null;
        }
        return value;
      }

      function getStepperBaseCount() {
        const raw = testCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_TEST_COUNT;
        }
        const parsed = Number(raw);
        if (!Number.isFinite(parsed)) {
          return DEFAULT_TEST_COUNT;
        }
        return clampCount(Math.round(parsed));
      }

      function adjustCount(delta) {
        if (testCountInput.disabled) {
          return;
        }
        testCountInput.value = String(clampCount(getStepperBaseCount() + delta));
      }

      function appendLog(target, device, message) {
        const li = document.createElement('li');
        const dot = document.createElement('span');
        const line = document.createElement('span');
        const time = document.createElement('span');
        const deviceTag = document.createElement('span');
        const messageText = document.createElement('span');
        dot.className = 'dot';
        line.className = 'log-line';
        time.className = 'log-time';
        deviceTag.className = 'log-device';
        messageText.className = 'log-message';
        time.textContent = '[' + nowTime() + ']';
        deviceTag.textContent = '[' + device + ']';
        messageText.textContent = message;
        li.appendChild(dot);
        line.appendChild(time);
        line.appendChild(deviceTag);
        line.appendChild(messageText);
        li.appendChild(line);
        target.appendChild(li);
        target.scrollTop = target.scrollHeight;
      }

      function resetMetrics() {
        analysisMetric.textContent = '攻击分析测试通过率：--';
        disposeMetric.textContent = '处置记录已处置ID：--';
      }

      function setRunningMetrics() {
        analysisMetric.textContent = '攻击分析测试通过率：测试进行中...';
        disposeMetric.textContent = '处置记录已处置ID：测试进行中...';
      }

      function setPassMetrics(passed, total) {
        const rate = total > 0 ? (passed / total) * 100 : 0;
        const text = rate.toFixed(1) + '%（' + passed + '/' + total + '）';
        analysisMetric.textContent = '攻击分析测试通过率：' + text;
        disposeMetric.textContent = '处置记录已处置ID：' + passed + ' 个';
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function hidePath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = path.dataset.total;
      }

      function setNode(node, visited, active) {
        node.classList.toggle('is-visited', Boolean(visited));
        node.classList.toggle('is-active', Boolean(active));
        node.setAttribute('r', active ? '14' : '10');
      }

      function resetFlow(flowName) {
        const flow = flows[flowName];
        flow.segments.forEach(hidePath);
        flow.nodes.forEach((node) => setNode(node, false, false));
      }

      function initFlows() {
        Object.keys(flows).forEach((name) => {
          flows[name].segments.forEach(initPath);
          resetFlow(name);
        });
      }

      function animatePath(path, duration) {
        return new Promise((resolve) => {
          path.style.transition = 'none';
          path.style.strokeDashoffset = path.dataset.total;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = '0';
            });
          });

          window.setTimeout(resolve, duration + 30);
        });
      }

      // ========== 官方标准 Remote ID 生成（GB 46750-2025 + CTA-2063-A）==========
      function generateId() {
        // 1. 厂商代码（3位大写字母，中国民航/CTA标准）
        const mfrCodes = ['DJI', 'Dji', 'FLR', 'AUT', 'P3X', 'ZHY']; // 大疆、飞米、极飞等
        const mfr = mfrCodes[Math.floor(Math.random() * mfrCodes.length)];

        // 2. 型号代码（2位字母/数字）
        const modelChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // 无IO01
        const model = Array.from({ length: 2 }, () =>
          modelChars[Math.floor(Math.random() * modelChars.length)]
        ).join('');

        // 3. 10位唯一序列号（数字+大写字母，无歧义）
        const serialChars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
        const serial = Array.from({ length: 10 }, () =>
          serialChars[Math.floor(Math.random() * serialChars.length)]
        ).join('');

        // 4. 拼接：官方 Remote ID（CTA-2063-A 格式）
        return `${mfr}-${model}-${serial}`;
      }

      function updateBlacklistDisplay() {
        const totalBlacklist = Array.from(new Set([...selfishBlacklist, ...highfreqBlacklist]));
        const blacklistCountElem = document.getElementById('blacklist-count');
        const blacklistSelect = document.getElementById('blacklist-select');
        if (blacklistCountElem) {
          blacklistCountElem.textContent = totalBlacklist.length;
        }
        if (!blacklistSelect) return;
        // 清空并填充选项
        blacklistSelect.innerHTML = '';
        if (totalBlacklist.length === 0) {
          const opt = document.createElement('span');
          opt.textContent = '—';
          opt.className = 'blacklist-empty';
          blacklistSelect.appendChild(opt);
        } else {
          totalBlacklist.forEach(id => {
            const opt = document.createElement('span');
            opt.className = 'blacklist-id-chip';
            opt.textContent = id;
            opt.setAttribute('role', 'listitem');
            blacklistSelect.appendChild(opt);
          });
          // 选中最后一项并滚动到可见
          blacklistSelect.scrollTop = blacklistSelect.scrollHeight;
        }
      }

      async function pulseNode(node) {
        setNode(node, true, true);
        await sleep(220);
        setNode(node, true, false);
      }

      async function playStep(flowName, stepIndex) {
        const flow = flows[flowName];
        const path = flow.segments[stepIndex];
        const node = flow.nodes[stepIndex];
        await animatePath(path, 420);
        await pulseNode(node);
      }

      function setRunningState(isRunning) {
        running = isRunning;
        selfishBtn.disabled = isRunning;
        highfreqBtn.disabled = isRunning;
        testCountInput.disabled = isRunning;
        if (highfreqIntervalInput) {
          highfreqIntervalInput.disabled = isRunning;
        }
        if (testCountUpBtn) {
          testCountUpBtn.disabled = isRunning;
        }
        if (testCountDownBtn) {
          testCountDownBtn.disabled = isRunning;
        }
      }

      async function runSelfish(count) {
        statusText.textContent = '正在执行：自私接入攻击测试';
        let passed = 0;

        for (let i = 1; i <= count; i += 1) {
          appendLog(analysisLog, '接入点', '第' + i + '次测试开始');
          appendLog(disposeLog, '区块链', '第' + i + '次测试开始');

          resetFlow('selfish');
          await playStep('selfish', 0);
          appendLog(analysisLog, '接入点', '检测到自私接入攻击，无人机发送ID和公钥');
          await sleep(180);

          await playStep('selfish', 1);
          appendLog(analysisLog, '区块链', '查询区块链身份信息');
          await sleep(180);

          await playStep('selfish', 2);
          appendLog(analysisLog, '区块链', '匹配信息完成，判定异常接入');
          await sleep(180);

          await playStep('selfish', 3);
          const id = generateId();
          selfishBlacklist.add(id);
          appendLog(disposeLog, '接入点', '无人机加入黑名单（原因：自私接入攻击，ID=' + id + '）');
          updateBlacklistDisplay();
          await sleep(260);
          passed += 1;
        }

        return passed;
      }

      async function runHighfreq(count) {
        statusText.textContent = '正在执行：高频重接入攻击测试';
        const intervalMs = parseHighfreqInterval();
        if (intervalMs === null) {
          statusText.textContent = '输入错误：接入时间间隔需为 ' + MIN_HIGHFREQ_INTERVAL_MS + '-' + MAX_HIGHFREQ_INTERVAL_MS + ' 的整数（ms）';
          appendLog(
            analysisLog,
            '接入点',
            '参数校验失败：接入时间间隔需为 ' + MIN_HIGHFREQ_INTERVAL_MS + '-' + MAX_HIGHFREQ_INTERVAL_MS + ' 的整数（ms）'
          );
          return null;
        }
        const isHighfreq = intervalMs <= HIGHFREQ_INTERVAL_THRESHOLD_MS;
        appendLog(
          analysisLog,
          '接入点',
          '高频判定：接入时间间隔=' + intervalMs + 'ms，阈值<= ' + HIGHFREQ_INTERVAL_THRESHOLD_MS + 'ms'
        );
        let passed = 0;

        for (let i = 1; i <= count; i += 1) {
          appendLog(analysisLog, '接入点', '第' + i + '次测试开始');
          appendLog(disposeLog, '区块链', '第' + i + '次测试开始');

          resetFlow('highfreq');
          await playStep('highfreq', 0);
          if (!isHighfreq) {
            for(let i =1;i<=5;i+=1){
              appendLog(analysisLog, '接入点', '收到接入请求');
              await sleep(intervalMs);
            }
            appendLog(analysisLog, '接入点', '接入时间间隔未达到高频条件，本次不记录违规行为');
            continue;
          }
          for(let i =1;i<=5;i+=1){
            appendLog(analysisLog, '接入点', '收到接入请求');
            await sleep(intervalMs);
          }
          appendLog(analysisLog, '接入点', '检测到高频重接入行为（接入时间间隔=' + intervalMs + 'ms）');
          await sleep(180);

          await playStep('highfreq', 1);
          appendLog(analysisLog, '区块链', '记录违规行为到链上');
          await sleep(180);

          await playStep('highfreq', 2);
          const id = generateId();
          highfreqBlacklist.add(id);
          appendLog(disposeLog, '接入点', '无人机加入黑名单（原因：高频重接入攻击，ID=' + id + '）');
          updateBlacklistDisplay();
          await sleep(intervalMs+3000);
          passed += 1;
        }

        return passed;
      }

      async function startTest(type) {
        if (running) {
          return;
        }

        const count = type === 'highfreq' ? DEFAULT_HIGHFREQ_TEST_COUNT : parseCount();
        if (count === null) {
          statusText.textContent = '输入错误：测试次数需为 ' + MIN_TEST_COUNT + '-' + MAX_TEST_COUNT + ' 的整数';
          appendLog(
            analysisLog,
            '接入点',
            '参数校验失败：测试次数需为 ' + MIN_TEST_COUNT + '-' + MAX_TEST_COUNT + ' 的整数'
          );
          return;
        }

        setRunningState(true);
        setRunningMetrics();
        resetFlow('selfish');
        resetFlow('highfreq');
        let passed = 0;

        if (type === 'selfish') {
          passed = await runSelfish(count);
          statusText.textContent = '自私接入攻击测试完成，共执行 ' + count + ' 次';
        } else {
          passed = await runHighfreq(count);
          if (passed === null) {
            resetMetrics();
            setRunningState(false);
            return;
          }
          statusText.textContent = '高频重接入攻击测试完成，共执行 ' + count + ' 次';
        }

        setPassMetrics(passed, count);
        setRunningState(false);
      }

      selfishBtn.addEventListener('click', function () {
        startTest('selfish');
      });

      highfreqBtn.addEventListener('click', function () {
        startTest('highfreq');
      });

      if (testCountUpBtn) {
        testCountUpBtn.addEventListener('click', function () {
          adjustCount(1);
        });
      }

      if (testCountDownBtn) {
        testCountDownBtn.addEventListener('click', function () {
          adjustCount(-1);
        });
      }

      initFlows();
      resetMetrics();
    })();
  </script>
</body>
