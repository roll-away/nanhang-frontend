<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>可信安全认证</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background: #ffffff;
      color: #1f2937;
    }

    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .section {
      padding: 16px;
      min-height: 0;
    }

    .section + .section {
      border-top: 1px dashed #cbd5e1;
    }

    .page > .section:last-child {
      overflow: hidden;
    }

    .hero-section {
      padding: 40px 10px 6px;
      background: #ffffff;
      border: 0;
      border-radius: 0;
    }

    .cert-hero {
      width: 100%;
      height: auto;
      display: grid;
      grid-template-columns: 4.2fr 1.35fr 7.3fr;
      gap: 14px;
      align-items: start;
      overflow: visible;
    }

    .hero-left-stack {
      display: grid;
      grid-template-rows: auto auto;
      gap: 8px;
    }

    .hero-card {
      position: relative;
      border: none;
      background: #ffffff;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
      overflow: visible;
      padding: 3px;
    }

    .hero-tag {
      /* 左上角浮动标签：相对 .hero-card 左上角向上偏�?*/
      position: absolute;
      left: 14px;
      top: -46px;
      margin: 0;
      padding: 15px 32px 10px;
      background: #0f4f77;
      color: #fff;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 6px 12px rgba(15, 79, 119, 0.28);
      line-height: 1;
      white-space: nowrap;
    }

    .hero-diagram {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-left .hero-diagram {
      height: 308px;
    }

    .hero-right .hero-diagram {
      height: 450px;
      aspect-ratio: 860 / 420;
    }

    .hero-right {
      width: 96%;
      justify-self: end;
      padding: 0;
    }

    .hero-arrow {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-top: 152px;
      padding-right: 0;
      transform: translateX(10px);
      position: relative;
      z-index: 6;
      overflow: visible;
    }

    .hero-arrow-combo {
      position: relative;
      width: 150px;
      height: 66px;
      background: #d66b16;
      border: none;
      border-radius: 0;
      box-shadow: 0 4px 9px rgba(100, 45, 14, 0.3);
      display: grid;
      place-items: center;
      padding-right: 30px;
      overflow: visible;
      z-index: 6;
    }

    .hero-arrow-combo::before {
      content: none;
    }

    .hero-arrow-combo::after {
      content: "";
      position: absolute;
      right: -13px;
      top: -12px;
      width: 0;
      height: 0;
      border-top: 45px solid transparent;
      border-bottom: 45px solid transparent;
      border-left: 15px solid #d66b16;
      transform: scale(1.3);
      transform-origin: left center;
    }

    .hero-boost-badge {
      margin: 0;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.22);
    }

    .hero-arrow-main {
      position: absolute;
      right: 2px;
      top: -6px;
      transform: scaleX(-1);
      width: 58px;
      z-index: 3;
      filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.28));
    }

    .hero-summary {
      padding: 10px 14px 10px 12px;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid #dbe7f5;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }

    .hero-summary-title {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
      color: #0b3a83;
      line-height: 1.2;
      letter-spacing: 0.3px;
    }

    .hero-summary-list {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 650;
    }

    .hero-summary-list li {
      position: relative;
      margin: 3px 0;
      padding-left: 18px;
      color: #0f172a;
    }

    .hero-summary-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.58em;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #22d3ee 0%, #2563eb 100%);
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.35);
    }

    .bottom-layout {
      display: grid;
      grid-template-columns: 3.6fr 1.45fr 4.95fr;
      gap: 16px;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .left-panel {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .test-config {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .test-count-input-wrap {
      position: relative;
      width: 180px;
      max-width: 100%;
    }

    .test-config-label {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
    }

    .current-mode-indicator {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      color: #1e40af;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .test-count-input {
      width: 100%;
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 13px;
      padding: 0 34px 0 10px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .test-count-input::-webkit-outer-spin-button,
    .test-count-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .count-stepper {
      position: absolute;
      right: 4px;
      top: 4px;
      bottom: 4px;
      width: 24px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
    }

    .count-step-btn {
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #f8fafc;
      color: #334155;
      font-size: 10px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .count-step-btn:hover:not(:disabled) {
      background: #eef2ff;
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    .count-step-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .test-count-input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.14);
    }

    .mode-btn {
      border: 1px solid #0f5f82;
      border-radius: 8px;
      background: #186487;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .mode-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 100, 135, 0.25);
    }

    .mode-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
      transform: none;
    }

    .mode-btn.start-btn {
      border-color: #0a7661;
      background: #0f8a72;
    }

    .mode-btn.is-active {
      background: #0d4f6d;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
    }

    .mode-btn.is-done {
      background: #0e7490;
      border-color: #0e7490;
    }

    .flow-wrap {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      height: auto;
      overflow: hidden;
      display: flex;
    }

    .flow-svg {
      width: 100%;
      height: auto;
      aspect-ratio: 900 / 320;
    }

    .flow-base {
      fill: none;
      stroke: #8ab8de;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .flow-active {
      fill: none;
      stroke: #2563eb;
      stroke-width: 30;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px rgba(37, 99, 235, 0.6));
    }

    .flow-node {
      fill: #ffffff;
      stroke: #93a4b5;
      stroke-width: 3;
      transition: fill 0.3s ease, stroke 0.3s ease, r 0.3s ease;
    }

    .flow-node.is-visited {
      fill: #ffffff;
      stroke: #2563eb;
    }

    .flow-node.is-active {
      fill: #ffffff;
      stroke: #1d4ed8;
      stroke-width: 4;
    }

    .flow-label {
      fill: #111827;
      font-size: 24px;
      font-weight: 600;
      user-select: none;
    }

    .flow-label-small {
      fill: #111827;
      font-size: 22px;
      font-weight: 600;
      user-select: none;
    }

    .flow-status {
      margin: 0;
      min-height: 22px;
      font-size: 14px;
      color: #1d4ed8;
      font-weight: 600;
    }

    .latency-panel {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f8fafc;
      padding: 10px;
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    .latency-card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #ffffff;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      padding: 8px 6px;
      text-align: center;
    }

    .latency-label {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #2563eb;
      line-height: 1.2;
      letter-spacing: 0.5px;
      text-shadow: 0 0 8px rgba(37, 99, 235, 0.24);
    }

    .latency-value {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      color: #0ea5e9;
      line-height: 1;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      text-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
    }

    .latency-value.improvement {
      color: #06b6d4;
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.34);
    }

    .right-panel {
      /* 右侧日志区的对比提示需要绝对定位覆盖在两栏中间 */
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: minmax(0, 1fr);
      grid-template-areas:
        "centralized distributed";
      gap: 10px;
      min-height: 0;
      align-items: stretch;
      overflow: hidden;
    }

    .centralized-box {
      grid-area: centralized;
    }

    .distributed-box {
      grid-area: distributed;
    }

    .log-box {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #ffffff;
      color: #3b82f6;
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      font-family: "SFMono-Regular", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      height: 100%;
    }

    .log-title {
      margin: 0;
      font-size: 15px;
      color: #3b82f6;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 8px;
    }

    .log-content {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 12px;
      color: #3b82f6;
      line-height: 1.55;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: rgba(59, 130, 246, 0.7) rgba(219, 234, 254, 0.9);
      white-space: pre-wrap;
    }

    .log-content::-webkit-scrollbar {
      width: 10px;
    }

    .log-content::-webkit-scrollbar-track {
      background: rgba(219, 234, 254, 0.9);
      border-radius: 10px;
    }

    .log-content::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.7);
      border-radius: 10px;
      border: 2px solid rgba(219, 234, 254, 0.9);
    }

    .log-content li {
      margin: 0 0 6px;
      word-break: break-word;
    }

    .log-metric {
      margin: 0;
      padding-top: 6px;
      border-top: 1px dashed rgba(148, 163, 184, 0.45);
      font-size: 12px;
      font-weight: 700;
      color: #3b82f6;
      line-height: 1.4;
    }

    .comparison-overlay {
      /* 对比浮层：默认位于右侧面板中心偏下，覆盖两列日志中间 */
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 5;
      width: min(430px, 100%);
      padding-top: 2px;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .comparison-overlay.is-visible {
      visibility: visible;
      opacity: 1;
    }

    .comparison-text {
      margin: 0;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(239, 68, 68, 0.55);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 4px 14px rgba(220, 38, 38, 0.18);
      color: #dc2626;
      font-size: 32.5px;
      line-height: 1.15;
      font-weight: 700;
      white-space: nowrap;
    }

    .comparison-arrow {
      width: min(360px, 100%);
      height: 72px;
      display: block;
      filter: drop-shadow(0 2px 5px rgba(220, 38, 38, 0.28));
    }

    @media (max-width: 1000px) {
      .hero-section {
        padding: 16px 12px 10px;
      }

      .cert-hero {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .hero-tag {
        position: static;
        display: inline-block;
        margin: 10px 0 8px 10px;
      }

      .hero-arrow {
        padding-top: 0;
        min-height: 86px;
      }

      .hero-arrow-main {
        width: 50px;
        top: -8px;
        right: 4px;
      }

      .hero-boost-badge {
        font-size: 16px;
      }

      .hero-card {
        padding: 3px;
      }

      .hero-left .hero-diagram,
      .hero-right .hero-diagram {
        height: auto;
      }

      .hero-right {
        width: 100%;
        justify-self: stretch;
      }

      .bottom-layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) 86px;
        grid-template-areas:
          "centralized"
          "distributed"
          "comparison";
      }

      .comparison-overlay {
        margin: 4px auto 0;
        width: min(300px, 100%);
      }

      .comparison-arrow {
        width: min(260px, 100%);
        height: 64px;
      }
    }

    @media (max-width: 760px) {
      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .test-count-input {
        width: 100%;
      }

      .test-count-input-wrap {
        width: 100%;
      }

      .flow-label {
        font-size: 19px;
      }

      .flow-label-small {
        font-size: 17px;
      }
    }
  </style>
</head>

  <script>
    (function () {
      const DEFAULT_SAMPLE_COUNT = 10;
      const MIN_SAMPLE_COUNT = 5;
      const MAX_SAMPLE_COUNT = 100;
      const NODE_BASE_R = 10;
      const NODE_ACTIVE_R = 17;
      const NON_KEY_STAGE_MS = [400, 1000];
      const LATENCY_TARGET_MS = {
        distributed: [520, 700],
        centralized: [920, 1100]
      };

      const startBtn = document.getElementById('start-test-btn');
      const authSequenceBtn = document.getElementById('auth-sequence-btn');
      const sampleCountInput = document.getElementById('sample-count-input');
      const sampleCountUpBtn = document.getElementById('sample-count-up');
      const sampleCountDownBtn = document.getElementById('sample-count-down');
      const currentModeIndicator = document.getElementById('current-mode-indicator');

      const statusEl = document.getElementById('flow-status');
      const distributedMetricsEl = document.getElementById('distributed-metrics');
      const centralizedMetricsEl = document.getElementById('centralized-metrics');
      const summaryCentralizedEl = document.getElementById('summary-centralized-value');
      const summaryDistributedEl = document.getElementById('summary-distributed-value');
      const summaryImprovementEl = document.getElementById('summary-improvement-value');
      const logEls = {
        distributed: document.getElementById('distributed-log'),
        centralized: document.getElementById('centralized-log')
      };

      const comparisonOverlay = document.getElementById('comparison-overlay');
      const comparisonText = document.getElementById('comparison-text');

      const paths = {
        seg1: document.getElementById('active-seg-1'),
        seg2: document.getElementById('active-seg-2'),
        top: document.getElementById('active-seg-top'),
        bottom: document.getElementById('active-seg-bottom')
      };

      const nodes = {
        issue: document.getElementById('node-issue'),
        request: document.getElementById('node-request'),
        distributed: document.getElementById('node-distributed'),
        centralized: document.getElementById('node-centralized')
      };

      function createModeState() {
        return {
          samples: [],
          avgLatency: null,
          completedCount: 0,
          targetCount: DEFAULT_SAMPLE_COUNT,
          running: false,
          done: false
        };
      }

      const state = {
        session: {
          started: false,
          roundId: 0,
          baseTime: 0
        },
        distributed: createModeState(),
        centralized: createModeState(),
        comparison: {
          ready: false,
          improvementPercent: null
        },
        runningMode: null,
        animationToken: 0
      };

      function randomInRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomMs(range) {
        return Math.round(randomInRange(range[0], range[1]));
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function nowStamp() {
        const d = new Date();
        const ms = String(d.getMilliseconds()).padStart(3, '0');
        return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' + ms;
      }

      function formatSeconds(sec) {
        return sec.toFixed(3);
      }

      function appendLog(mode, message) {
        const ul = logEls[mode];
        const li = document.createElement('li');
        li.textContent = '[' + nowStamp() + '] ' + message;
        ul.appendChild(li);
        ul.scrollTop = ul.scrollHeight;
      }

      function appendBothLogs(message) {
        appendLog('distributed', message);
        appendLog('centralized', message);
      }

      function clearLogs() {
        Object.values(logEls).forEach((ul) => {
          ul.innerHTML = '';
        });
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updateCurrentModeIndicator() {
        let text = '当前测试：等待开始';
        if (state.runningMode === 'init') {
          text = '当前测试：环境初始化';
        } else if (state.runningMode === 'centralized') {
          text = '当前测试：集中式认证';
        } else if (state.runningMode === 'distributed') {
          text = '当前测试：分布式认证';
        } else if (state.centralized.done && state.distributed.done) {
          text = '当前测试：测试完成';
        }

        currentModeIndicator.textContent = text;
      }

      function getMetricText(modeLabel, modeState) {
        const avgText = modeState.avgLatency === null ? '--' : formatSeconds(modeState.avgLatency) + 's';
        return modeLabel + '：已完成 ' + modeState.completedCount + '/' + modeState.targetCount + '，当前平均时延 ' + avgText;
      }

      function getAvgLatencyText(modeState) {
        return modeState.avgLatency === null ? '--' : formatSeconds(modeState.avgLatency) + 's';
      }

      function getImprovementText() {
        const dist = state.distributed.avgLatency;
        const cent = state.centralized.avgLatency;
        if (!state.distributed.done||!state.centralized.done) {
          return '--';
        }
        if (dist === null || cent === null || cent <= 0) {
          return '--';
        }
        const improvement = ((cent - dist) / cent) * 100;
        return improvement.toFixed(2) + '%';
      }

      function updateMetricsPanel() {
        distributedMetricsEl.textContent = getMetricText('分布式', state.distributed);
        centralizedMetricsEl.textContent = getMetricText('集中式', state.centralized);
        summaryCentralizedEl.textContent = getAvgLatencyText(state.centralized);
        summaryDistributedEl.textContent = getAvgLatencyText(state.distributed);
        summaryImprovementEl.textContent = getImprovementText();
      }

      function appendTargetCountError(mode, message) {
        if (mode === 'distributed' || mode === 'centralized') {
          appendLog(mode, '[测试控制器] ' + message);
          return;
        }
        appendBothLogs('[测试控制器] ' + message);
      }

      function readTargetCount(mode) {
        const raw = sampleCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_SAMPLE_COUNT;
        }

        if (!/^\d+$/.test(raw)) {
          setStatus('输入错误：总测试次数必须为整数（5-100）。');
          appendTargetCountError(mode, '输入错误：总测试次数必须为整数（5-100）。');
          return null;
        }

        const value = Number(raw);
        if (value < MIN_SAMPLE_COUNT || value > MAX_SAMPLE_COUNT) {
          setStatus('输入错误：总测试次数范围应为 5-100。');
          appendTargetCountError(mode, '输入错误：总测试次数范围应为 5-100。');
          return null;
        }

        return value;
      }

      function clampSampleCount(value) {
        return Math.min(MAX_SAMPLE_COUNT, Math.max(MIN_SAMPLE_COUNT, value));
      }

      function getStepperBaseCount() {
        const raw = sampleCountInput.value.trim();
        if (raw === '') {
          return DEFAULT_SAMPLE_COUNT;
        }
        const parsed = Number(raw);
        if (!Number.isFinite(parsed)) {
          return DEFAULT_SAMPLE_COUNT;
        }
        return clampSampleCount(Math.round(parsed));
      }

      function adjustSampleCount(delta) {
        if (sampleCountInput.disabled) {
          return;
        }
        const nextValue = clampSampleCount(getStepperBaseCount() + delta);
        sampleCountInput.value = String(nextValue);
      }

      function createLatencyPlan(mode) {
        const targetMs = randomMs(LATENCY_TARGET_MS[mode]);
        const requestPathMs = Math.round(targetMs * 0.16);
        const requestPulseMs = Math.round(targetMs * 0.12);
        const authPathMs = Math.round(targetMs * 0.22);
        const authPulseMs = Math.round(targetMs * 0.12);
        const processingMs = Math.max(
          0,
          targetMs - requestPathMs - requestPulseMs - authPathMs - authPulseMs
        );

        return {
          targetMs,
          requestPathMs,
          requestPulseMs,
          processingMs,
          authPathMs,
          authPulseMs
        };
      }

      function hideComparison() {
        state.comparison.ready = false;
        state.comparison.improvementPercent = null;
        comparisonText.textContent = '';
        comparisonOverlay.classList.remove('is-visible');
      }

      function showComparison() {
        const dist = state.distributed.avgLatency;
        const cent = state.centralized.avgLatency;
        if (dist === null || cent === null) {
          return;
        }
        const improvement = ((cent - dist) / cent) * 100;
        state.comparison.ready = true;
        state.comparison.improvementPercent = improvement;
        comparisonText.textContent =
          '效率提升 ' + improvement.toFixed(2) + '% | 分布式 ' + formatSeconds(dist) + 's vs 集中式 ' + formatSeconds(cent) + 's';
        comparisonOverlay.classList.add('is-visible');
      }

      function handleComparisonResult() {
        if (!state.distributed.done || !state.centralized.done) {
          return;
        }

        if (state.distributed.targetCount !== state.centralized.targetCount) {
          hideComparison();
          setStatus('样本数不一致，无法对比，请重新测试并保持一致。');
          appendBothLogs(
            '[对比结果] 样本数不一致（分布式 ' +
              state.distributed.targetCount +
              '次，集中式 ' +
              state.centralized.targetCount +
              '次），无法计算效率提升。'
          );
          return;
        }

        showComparison();
        setStatus('步骤4/4：对比完成，分布式跨域认证效率提升已生成');
      }

      function setButtonsState() {
        const busy = state.runningMode !== null;
        startBtn.disabled = busy;
        sampleCountInput.disabled = busy;
        if (sampleCountUpBtn) {
          sampleCountUpBtn.disabled = busy;
        }
        if (sampleCountDownBtn) {
          sampleCountDownBtn.disabled = busy;
        }

        const sequenceDone = state.distributed.done && state.centralized.done;
        authSequenceBtn.disabled = !state.session.started || busy || sequenceDone;
        authSequenceBtn.classList.toggle(
          'is-active',
          state.runningMode === 'centralized' || state.runningMode === 'distributed'
        );
        authSequenceBtn.classList.toggle('is-done', sequenceDone);
        updateCurrentModeIndicator();
      }

      function initPath(path) {
        const total = path.getTotalLength();
        path.dataset.total = String(total);
        path.style.transition = 'none';
        path.style.strokeDasharray = String(total);
        path.style.strokeDashoffset = String(total);
      }

      function hidePath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = path.dataset.total;
      }

      function showPath(path) {
        path.style.transition = 'none';
        path.style.strokeDashoffset = '0';
      }

      function setNode(nodeKey, visited, active) {
        const node = nodes[nodeKey];
        node.classList.toggle('is-visited', Boolean(visited));
        node.classList.toggle('is-active', Boolean(active));
        node.setAttribute('r', String(active ? NODE_ACTIVE_R : NODE_BASE_R));
      }

      function resetFlow() {
        Object.values(paths).forEach(initPath);
        Object.keys(nodes).forEach((key) => setNode(key, false, false));
      }

      function resetSampleFlowVisual() {
        hidePath(paths.seg2);
        hidePath(paths.top);
        hidePath(paths.bottom);
        setNode('request', false, false);
        setNode('distributed', false, false);
        setNode('centralized', false, false);
        setNode('issue', true, false);
      }

      function animatePath(path, duration, token) {
        return new Promise((resolve) => {
          if (token !== state.animationToken) {
            resolve(false);
            return;
          }

          path.style.transition = 'none';
          path.style.strokeDashoffset = path.dataset.total;

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              path.style.transition = 'stroke-dashoffset ' + duration + 'ms linear';
              path.style.strokeDashoffset = '0';
            });
          });

          window.setTimeout(() => {
            resolve(token === state.animationToken);
          }, duration + 30);
        });
      }

      async function pulseNode(nodeKey, keepVisited, token, duration) {
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, true, true);
        await sleep(duration);
        if (token !== state.animationToken) {
          return false;
        }
        setNode(nodeKey, keepVisited, false);
        return true;
      }

      async function runInitialization() {
        state.runningMode = 'init';
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        clearLogs();
        hideComparison();
        resetFlow();

        appendBothLogs('[测试控制器] 新一轮认证测试启动，轮次 ID=' + state.session.roundId + '。');
        setStatus('步骤1/4：正在执行证书颁发与链上查询');

        await sleep(randomMs(NON_KEY_STAGE_MS));
        if (token !== state.animationToken) return;

        appendBothLogs('[区块链系统服务组件] 启动证书颁发流程，准备写入链上证书信息。');

        const okPath = await animatePath(paths.seg1, 650, token);
        if (!okPath) return;
        const okNode = await pulseNode('issue', true, token);
        if (!okNode) return;

        appendBothLogs('[区块链系统服务组件] 执行链上证书查询，证书记录一致性校验通过。');
        setStatus('步骤1完成：可点击“开始认证测试”，系统将先执行集中式认证，再执行分布式认证。');

        state.runningMode = null;
        setButtonsState();
      }

      async function doRequestStage(mode, sampleNo, token, latencyPlan) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[异域无人机] 第' + sampleNo + '次发起跨域证书认证请求。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 无人机认证请求');

        resetSampleFlowVisual();
        const okPath = await animatePath(paths.seg2, latencyPlan.requestPathMs, token);
        if (!okPath) return false;
        return pulseNode('request', true, token, latencyPlan.requestPulseMs);
      }

      async function doAuthStage(mode, sampleNo, token, latencyPlan) {
        const targetCount = state[mode].targetCount;
        const modeLabel = mode === 'distributed' ? '分布式' : '集中式';
        appendLog(mode, '[接入点] 第' + sampleNo + '次启动' + modeLabel + '跨域证书验证。');
        setStatus('步骤2/3：' + modeLabel + ' 第' + sampleNo + '/' + targetCount + '次 - 接入点验证中');

        const path = mode === 'distributed' ? paths.top : paths.bottom;
        const nodeKey = mode === 'distributed' ? 'distributed' : 'centralized';

        const okPath = await animatePath(path, latencyPlan.authPathMs, token);
        if (!okPath) return false;
        return pulseNode(nodeKey, true, token, latencyPlan.authPulseMs);
      }

      function getModeAvg(mode) {
        const samples = state[mode].samples;
        const sum = samples.reduce((acc, value) => acc + value, 0);
        return sum / samples.length;
      }

      async function runModeBatch(mode, targetCountOverride) {
        if (!state.session.started || state.runningMode !== null || state[mode].done) {
          return;
        }

        const targetCount =
          typeof targetCountOverride === 'number' ? targetCountOverride : readTargetCount(mode);
        if (targetCount === null) {
          updateMetricsPanel();
          return;
        }

        state[mode].targetCount = targetCount;
        state[mode].samples = [];
        state[mode].avgLatency = null;
        state[mode].completedCount = 0;
        updateMetricsPanel();

        state.runningMode = mode;
        state[mode].running = true;
        state.animationToken += 1;
        const token = state.animationToken;
        setButtonsState();

        const modeLabel = mode === 'distributed' ? '分布式认证' : '集中式认证';
        appendLog(mode, '[测试控制器] ' + modeLabel + '批量测试启动，样本数=' + targetCount + '。');

        for (let i = 1; i <= targetCount; i += 1) {
          if (token !== state.animationToken) {
            return;
          }

          const latencyPlan = createLatencyPlan(mode);
          const roundStart = performance.now();

          const okRequest = await doRequestStage(mode, i, token, latencyPlan);
          if (!okRequest || token !== state.animationToken) {
            return;
          }

          await sleep(latencyPlan.processingMs);
          if (token !== state.animationToken) {
            return;
          }

          const okAuth = await doAuthStage(mode, i, token, latencyPlan);
          if (!okAuth || token !== state.animationToken) {
            return;
          }

          const latency = (performance.now() - roundStart) / 1000;
          state[mode].samples.push(latency);
          state[mode].completedCount = i;
          state[mode].avgLatency = getModeAvg(mode);
          updateMetricsPanel();

          appendLog(
            mode,
            '[区块链系统服务组件] 第' + i + '次认证时延 ' + formatSeconds(latency) + 's，已完成统计。'
          );
        }

        if (token !== state.animationToken) {
          return;
        }

        const avg = state[mode].avgLatency === null ? getModeAvg(mode) : state[mode].avgLatency;
        state[mode].avgLatency = avg;
        state[mode].done = true;
        state[mode].running = false;
        state.runningMode = null;
        updateMetricsPanel();

        appendLog(mode, '[统计结果] ' + modeLabel + '平均时延=' + formatSeconds(avg) + 's（样本 ' + targetCount + '次）。');
        setStatus(modeLabel + '完成，等待另一方案完成后自动计算效率提升。');

        handleComparisonResult();

        setButtonsState();
      }

      async function runAuthSequence() {
        if (!state.session.started || state.runningMode !== null) {
          return;
        }

        const targetCount = readTargetCount();
        if (targetCount === null) {
          updateMetricsPanel();
          return;
        }

        appendBothLogs('[测试控制器] 开始自动认证测试：先执行集中式认证，再执行分布式认证，样本数=' + targetCount + '。');
        setStatus('步骤2/4：准备执行集中式认证批量测试。');

        await runModeBatch('centralized', targetCount);
        if (!state.centralized.done) {
          return;
        }

        setStatus('步骤3/4：集中式认证完成，开始执行分布式认证批量测试。');
        await runModeBatch('distributed', targetCount);
      }

      function resetSessionData() {
        state.distributed = createModeState();
        state.centralized = createModeState();
        state.comparison = {
          ready: false,
          improvementPercent: null
        };
        state.distributed.targetCount = DEFAULT_SAMPLE_COUNT;
        state.centralized.targetCount = DEFAULT_SAMPLE_COUNT;
        updateMetricsPanel();
      }

      startBtn.addEventListener('click', async () => {
        if (state.runningMode !== null) {
          return;
        }

        state.session.started = true;
        state.session.roundId += 1;
        state.session.baseTime = Date.now();

        resetSessionData();
        setButtonsState();
        await runInitialization();
      });

      authSequenceBtn.addEventListener('click', () => {
        runAuthSequence();
      });

      if (sampleCountUpBtn) {
        sampleCountUpBtn.addEventListener('click', () => {
          adjustSampleCount(1);
        });
      }

      if (sampleCountDownBtn) {
        sampleCountDownBtn.addEventListener('click', () => {
          adjustSampleCount(-1);
        });
      }

      resetFlow();
      clearLogs();
      hideComparison();
      updateMetricsPanel();
      setButtonsState();
    })();
  </script>
</body>
</html>
